<!DOCTYPE html>
<html lang="zh-TW">
<head><link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>SAG 專業工具</title>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:20px;
}

h1 { text-align:center; }

.card {
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

input {
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
    border:none;
}

.row {
    display:flex;
    gap:15px;
}

.col { flex:1; }

button {
    width:100%;
    padding:12px;
    font-size:16px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.progress {
    height:20px;
    background:#334155;
    border-radius:10px;
    overflow:hidden;
    margin-top:5px;
}

.bar {
    height:100%;
    background:#22c55e;
}

.red { background:#ef4444 !important; }
.blue { background:#3b82f6 !important; }

table {
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

td, th {
    padding:8px;
    border-bottom:1px solid #444;
}
</style>
</head>

<body>
     <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

<h1>🏍 SAG 專業調校工具</h1>

<div class="card">
<h3>📋 客戶資料</h3>
<input id="name" placeholder="客戶名稱">
<input id="bike" placeholder="車種">
<input id="weight" type="number" placeholder="體重(kg)">
</div>

<div class="card row">
<div class="col">
<h3>前避震</h3>
<input id="f_travel" type="number" placeholder="行程(mm)">
<input id="f_actual" type="number" placeholder="實際SAG(mm)">
<input id="f_comp" type="number" placeholder="壓縮阻尼">
<input id="f_reb" type="number" placeholder="回彈阻尼">
</div>

<div class="col">
<h3>後避震</h3>
<input id="r_travel" type="number" placeholder="行程(mm)">
<input id="r_actual" type="number" placeholder="實際SAG(mm)">
<input id="r_comp" type="number" placeholder="壓縮阻尼">
<input id="r_reb" type="number" placeholder="回彈阻尼">
</div>
</div>

<button onclick="calculate()">計算 SAG</button>
<button onclick="downloadExcel()">下載 Excel</button>

<div id="result" class="card" style="display:none;"></div>

<script>
const SAG_PERCENT = 30;

function sag(travel){ return travel * SAG_PERCENT / 100; }

function status(actual, target){
    if(actual < target) return ["偏硬 🔴","red"];
    if(actual > target) return ["偏軟 🔵","blue"];
    return ["正確 ✅",""];
}

function barHTML(value, max, color){
    let percent = max ? Math.min(value/max*100,100) : 0;
    return `
    <div class="progress">
        <div class="bar ${color}" style="width:${percent}%"></div>
    </div>`;
}

let latestData = null;

function calculate(){
    let name = nameInput.value;
    let bike = bikeInput.value;
    let weight = +weightInput.value || 0;

    let ft = +f_travel.value || 0;
    let fa = +f_actual.value || 0;
    let rt = +r_travel.value || 0;
    let ra = +r_actual.value || 0;

    let ft_t = sag(ft);
    let rt_t = sag(rt);

    let [fs, fc] = status(fa, ft_t);
    let [rs, rc] = status(ra, rt_t);

    let hint = weight < 65 ? "偏輕 → 建議軟彈簧"
            : weight > 85 ? "偏重 → 建議硬彈簧"
            : "正常範圍";

    latestData = [
        ["前避震", ft, fa, ft_t, fs],
        ["後避震", rt, ra, rt_t, rs]
    ];

    let html = `
    <h3>📊 結果</h3>
    <p>${name} | ${bike}</p>

    <h4>前避震</h4>
    ${barHTML(fa, ft, fc)}
    <p>理想: ${ft_t.toFixed(1)} | 實際: ${fa}</p>
    <p>${fs}</p>

    <h4>後避震</h4>
    ${barHTML(ra, rt, rc)}
    <p>理想: ${rt_t.toFixed(1)} | 實際: ${ra}</p>
    <p>${rs}</p>

    <h3>⚙️ 建議</h3>
    <p>${hint}</p>

    <table>
    <tr><th>部位</th><th>行程</th><th>實際</th><th>理想</th><th>狀態</th></tr>
    ${latestData.map(r=>`
        <tr>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
        <td>${r[2]}</td>
        <td>${r[3].toFixed(1)}</td>
        <td>${r[4]}</td>
        </tr>`).join("")}
    </table>
    `;

    result.innerHTML = html;
    result.style.display = "block";
}

function downloadExcel(){
    if(!latestData){
        alert("請先計算");
        return;
    }

    let csv = "部位,行程,實際SAG,理想SAG,狀態\n";
    latestData.forEach(r=>{
        csv += r.join(",") + "\n";
    });

    let blob = new Blob([csv], { type: 'text/csv' });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "SAG紀錄.csv";
    a.click();
}

// 快速取DOM
const nameInput = document.getElementById("name");
const bikeInput = document.getElementById("bike");
const weightInput = document.getElementById("weight");
</script>

</body>
</html>
